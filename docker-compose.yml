services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: notesy
      POSTGRES_USER: notesy
      POSTGRES_PASSWORD: notesy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesy -d notesy"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: "dev-only-docker-secret-key"
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "notesy"
      DB_USER: "notesy"
      DB_PASSWORD: "notesy"
      DB_HOST: "postgres"
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             gunicorn notesy.wsgi:application --bind 0.0.0.0:8000"

volumes:
  postgres_data:
